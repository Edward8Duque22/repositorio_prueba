<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración — Archivo Creativo</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('admin_auth') !== 'true') window.location.href = 'login.html';
    </script>
</head>
<body>

<header>
    <div class="header-brand"><h1>Panel Admin</h1></div>
    <div class="header-right">
        <button class="btn btn-danger" onclick="localStorage.clear(); location.href='login.html'">Salir</button>
    </div>
</header>

<div class="container admin-layout">
    <aside class="admin-sidebar">
        <h3>Nuevo Proyecto</h3>
        <div class="form-group">
            <input type="text" id="titulo" placeholder="Título">
            <input type="date" id="fecha">
            <input type="file" id="foto" accept="image/*">
            <input type="text" id="repo" placeholder="Repo URL">
            <input type="text" id="live" placeholder="Live URL">
            <textarea id="desc" placeholder="Descripción"></textarea>
            <button class="btn btn-accent btn-full" onclick="agregarProyecto()">Guardar</button>
        </div>
    </aside>

    <main class="admin-main">
        <div id="admin-lista" class="admin-list-container">
            </div>
    </main>
</div>

<script src="script.js"></script>
<script>
    async function cargarAdmin() {
    try {
        // Cambiamos la ruta para que coincida con vercel.json e index.js
        const res = await fetch('/api?accion=listar'); 
        
        if (!res.ok) throw new Error("Error en el servidor");
        
        const proyectos = await res.json();
        const lista = document.getElementById('admin-lista');

        if (proyectos.length === 0) {
            lista.innerHTML = '<p style="color:gray; padding:20px;">No hay proyectos en la base de datos.</p>';
            return;
        }

        lista.innerHTML = proyectos.map(p => `
            <div class="admin-card" style="border:1px solid #333; margin-bottom:10px; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong style="color:white;">${p.titulo}</strong>
                    <br><small style="color:gray;">${p.fecha}</small>
                </div>
                <button class="btn btn-danger" onclick="eliminarProyecto('${p._id}')" style="background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Eliminar 🗑️</button>
            </div>
        `).join('');
    } catch (err) {
        console.error("Fallo al listar:", err);
        document.getElementById('admin-lista').innerHTML = '<p style="color:red;">Error al conectar con MongoDB.</p>';
    }
}
</script>
</body>
</html>
