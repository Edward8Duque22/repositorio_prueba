<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración — Archivo Creativo</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('admin_auth') !== 'true') window.location.href = 'login.html';
    </script>
</head>
<body>

<header>
    <div class="header-brand"><h1>Panel Admin</h1></div>
    <div class="header-right">
        <button class="btn btn-danger" onclick="localStorage.clear(); location.href='login.html'">Salir</button>
    </div>
</header>

<div class="container admin-layout">
    <aside class="admin-sidebar">
        <h3>Nuevo Proyecto</h3>
        <div class="form-group">
            <input type="text" id="titulo" placeholder="Título">
            <input type="date" id="fecha">
            <input type="file" id="foto" accept="image/*">
            <input type="text" id="repo" placeholder="Repo URL">
            <input type="text" id="live" placeholder="Live URL">
            <textarea id="desc" placeholder="Descripción"></textarea>
            <button class="btn btn-accent btn-full" onclick="agregarProyecto()">Guardar</button>
        </div>
    </aside>

    <main class="admin-main">
        <div id="admin-lista" class="admin-list-container">
            </div>
    </main>
</div>

<script src="script.js"></script>
<script>
    async function cargarAdmin() {
        const res = await fetch('/peticiones?accion=listar');
        const proyectos = await res.json();
        const lista = document.getElementById('admin-lista');

        lista.innerHTML = proyectos.map(p => `
            <div class="admin-card">
                <h4>${p.titulo}</h4>
                <button class="btn btn-danger" onclick="eliminarProyecto('${p._id}')">Eliminar 🗑️</button>
            </div>
        `).join('');
    }
    document.addEventListener('DOMContentLoaded', cargarAdmin);
</script>
</body>
</html>
