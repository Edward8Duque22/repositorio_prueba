<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso — Archivo Creativo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div class="login-card">
        <h2>Ingresar</h2>
        <input type="password" id="clave" placeholder="Escribe 12345">
        <button onclick="validarAcceso()">Entrar</button>
    </div>

    <script>
        async function validarAcceso() {
            const pass = document.getElementById('clave').value;
            // Genera el código hash de la clave escrita
            const hash = CryptoJS.SHA256(pass).toString();

            try {
                const res = await fetch('/api/peticion?accion=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hash: hash })
                });

                if (res.ok) {
                    localStorage.setItem('admin_auth', 'true');
                    window.location.href = 'admin.html';
                } else {
                    alert("Contraseña incorrecta en el servidor.");
                }
            } catch (err) {
                alert("Error de conexión. Revisa que Vercel esté Online.");
            }
        }
    </script>
</body>
</html>
